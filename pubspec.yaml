name: fasthub
description: "Its an app for university students where they can post about their lost, found products and also if they want to sell anything with proper login from uni email and profile info page also"

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

# Version of your application.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  url_launcher: ^6.3.1
  supabase_flutter: ^2.3.4
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1


# App icon configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"


flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png